# Minimal egress-allowlist proxy for arena build phases. Default-deny; only the
# package registries below are reachable, filtered by destination domain (so CDN IP
# churn is irrelevant). No TLS interception — CONNECT is filtered by host.
http_port 3128

acl allowed_domains dstdomain pypi.org files.pythonhosted.org
acl allowed_domains dstdomain proxy.golang.org sum.golang.org
acl allowed_domains dstdomain crates.io static.crates.io index.crates.io
acl allowed_domains dstdomain registry.npmjs.org
acl allowed_domains dstdomain repo.maven.apache.org repo1.maven.org

acl SSL_ports port 443
acl CONNECT method CONNECT
http_access deny CONNECT !SSL_ports

http_access allow allowed_domains
http_access deny all

cache deny all
